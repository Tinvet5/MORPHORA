<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobile scaling -->
  <title>MORPHORA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
</head>

<body>

<header class="topbar">
  <h1>MORPHORA</h1>
</header>

<div id="viewer"></div>

<!-- =========================
     MODERN DROPDOWN MENU
========================= -->
<div class="menu" data-title="Controls">

  <!-- Toggle Button -->
  <button id="menuBtn" class="menu-btn">
    ☰
  </button>

  <!-- Panel -->
  <div id="menuPanel" class="menu-panel">

    <input type="text" placeholder="Search labels..." id="searchInput">

    <div class="menu-section" data-title="Controls">
      <button id="toggleLabels">👁 Labels</button>
      <button id="resetView">🔄 Reset View</button>
    </div>

    <div class="menu-section" data-title="Controls">
      <button data-img="skull1">Lateral</button>
      <button data-img="skull2">Ventral</button>
      <button data-img="skull3">Dorsal</button>
      <button data-img="skull4">Frontal</button>
    </div>

    <div class="menu-section" data-title="Controls">
      <button id="toggleTheme">🌙 Toggle Theme</button>
      <button id="addAnnotation">✏ Add Note</button>
    </div>

  </div>
</div>

<!-- Info panel centered at bottom for mobile -->
<div id="infoPanel" class="info-panel hidden" style="
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 320px;
  z-index: 1000;
">
  <h3 id="infoTitle"></h3>
  <p id="infoText"></p>
</div>

<script src="script.js"></script>

</body>
</html>
